<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <!-- Transparent background — foreground layer only -->
  <!-- Safe zone: inner 72x72 centred in 108x108 -->
  <defs>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5C0"/>
      <stop offset="100%" style="stop-color:#00B49A"/>
    </linearGradient>
  </defs>

  <!-- Calendar body -->
  <rect x="22" y="30" width="64" height="56" rx="7" fill="#18181C"/>

  <!-- Top bar -->
  <rect x="22" y="30" width="64" height="18" rx="7" fill="url(#acc)"/>
  <rect x="22" y="42" width="64" height="6" fill="url(#acc)"/>

  <!-- Binding rings -->
  <rect x="36" y="24" width="7" height="13" rx="3.5" fill="url(#acc)"/>
  <rect x="65" y="24" width="7" height="13" rx="3.5" fill="url(#acc)"/>

  <!-- Grid -->
  <line x1="22" y1="62" x2="86" y2="62" stroke="#2A2A35" stroke-width="0.8"/>
  <line x1="22" y1="72" x2="86" y2="72" stroke="#2A2A35" stroke-width="0.8"/>
  <line x1="43" y1="48" x2="43" y2="86" stroke="#2A2A35" stroke-width="0.8"/>
  <line x1="54" y1="48" x2="54" y2="86" stroke="#2A2A35" stroke-width="0.8"/>
  <line x1="65" y1="48" x2="65" y2="86" stroke="#2A2A35" stroke-width="0.8"/>

  <!-- Dots row 1 -->
  <circle cx="33" cy="55" r="4" fill="url(#acc)"/>
  <polyline points="30,55 33,58.5 38,51" fill="none" stroke="#0D0D0F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="49" cy="55" r="2.5" fill="#2A2A35"/>
  <circle cx="60" cy="55" r="2.5" fill="#2A2A35"/>
  <circle cx="75" cy="55" r="2.5" fill="#2A2A35"/>

  <!-- Dots row 2 -->
  <circle cx="33" cy="67" r="2.5" fill="#2A2A35"/>
  <circle cx="49" cy="67" r="2.5" fill="#2A2A35"/>
  <circle cx="60" cy="67" r="4" fill="none" stroke="#00E5C0" stroke-width="1.5"/>
  <circle cx="75" cy="67" r="2.5" fill="#2A2A35"/>

  <!-- Dots row 3 -->
  <circle cx="33" cy="77" r="2.5" fill="#2A2A35"/>
  <circle cx="49" cy="77" r="4" fill="none" stroke="#00E5C0" stroke-width="1.2" opacity="0.6"/>
  <circle cx="60" cy="77" r="2.5" fill="#2A2A35"/>
  <circle cx="75" cy="77" r="2.5" fill="#2A2A35"/>
</svg>
