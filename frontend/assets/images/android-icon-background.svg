    <circle cx="72" cy="36" r="1.5"/><circle cx="90" cy="36" r="1.5"/>
    <circle cx="18" cy="54" r="1.5"/><circle cx="36" cy="54" r="1.5"/><circle cx="54" cy="54" r="1.5"/>
    <circle cx="72" cy="54" r="1.5"/><circle cx="90" cy="54" r="1.5"/>
