<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <!-- Monochrome: white only, no gradients, no color -->
  <!-- Android uses this for themed/tinted icons -->

  <!-- Calendar body -->
  <rect x="22" y="30" width="64" height="56" rx="7" fill="white"/>

  <!-- Cut out the interior so it's a frame -->
  <rect x="27" y="48" width="54" height="34" rx="3" fill="black"/>

  <!-- Top bar solid -->
  <rect x="22" y="30" width="64" height="20" rx="7" fill="white"/>
  <rect x="22" y="44" width="64" height="6" fill="white"/>

  <!-- Binding rings -->
  <rect x="36" y="24" width="7" height="14" rx="3.5" fill="white"/>
  <rect x="65" y="24" width="7" height="14" rx="3.5" fill="white"/>

  <!-- Grid dots white on black cutout -->
  <circle cx="33" cy="57" r="3.5" fill="white"/>
  <circle cx="49" cy="57" r="2" fill="white"/>
  <circle cx="60" cy="57" r="2" fill="white"/>
  <circle cx="75" cy="57" r="2" fill="white"/>

  <circle cx="33" cy="67" r="2" fill="white"/>
  <circle cx="49" cy="67" r="2" fill="white"/>
  <circle cx="60" cy="67" r="3.5" fill="white"/>
  <circle cx="75" cy="67" r="2" fill="white"/>

  <circle cx="33" cy="76" r="2" fill="white"/>
  <circle cx="49" cy="76" r="3" fill="white"/>
  <circle cx="60" cy="76" r="2" fill="white"/>
  <circle cx="75" cy="76" r="2" fill="white"/>

  <!-- Checkmark on first dot -->
  <polyline points="29.5,57 32.5,60.5 37.5,53" fill="none" stroke="black" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
