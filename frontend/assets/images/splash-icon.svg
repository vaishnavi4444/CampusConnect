<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5C0"/>
      <stop offset="100%" style="stop-color:#00B49A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Calendar card -->
  <rect x="40" y="30" width="120" height="108" rx="14" fill="#18181C" stroke="#252530" stroke-width="1.5"/>

  <!-- Top bar -->
  <rect x="40" y="30" width="120" height="32" rx="14" fill="url(#acc)"/>
  <rect x="40" y="52" width="120" height="10" fill="url(#acc)"/>

  <!-- Rings -->
  <rect x="66" y="20" width="12" height="22" rx="6" fill="url(#acc)" filter="url(#glow)"/>
  <rect x="122" y="20" width="12" height="22" rx="6" fill="url(#acc)" filter="url(#glow)"/>

  <!-- EVNTO text in top bar -->
  <text x="100" y="52" font-family="Arial Black, Arial, sans-serif" font-size="14" font-weight="900" fill="#0D0D0F" text-anchor="middle" letter-spacing="3">EVNTO</text>

  <!-- Grid -->
  <line x1="40" y1="100" x2="160" y2="100" stroke="#2A2A35" stroke-width="1"/>
  <line x1="40" y1="118" x2="160" y2="118" stroke="#2A2A35" stroke-width="1"/>
  <line x1="72" y1="62" x2="72" y2="138" stroke="#2A2A35" stroke-width="1"/>
  <line x1="100" y1="62" x2="100" y2="138" stroke="#2A2A35" stroke-width="1"/>
  <line x1="128" y1="62" x2="128" y2="138" stroke="#2A2A35" stroke-width="1"/>

  <!-- Row 1 -->
  <circle cx="56" cy="81" r="7" fill="url(#acc)" filter="url(#glow)"/>
  <polyline points="52,81 55.5,85 62,76" fill="none" stroke="#0D0D0F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="86" cy="81" r="4.5" fill="#252530"/>
  <circle cx="114" cy="81" r="4.5" fill="#252530"/>
  <circle cx="144" cy="81" r="4.5" fill="#252530"/>

  <!-- Row 2 -->
  <circle cx="56" cy="109" r="4.5" fill="#252530"/>
  <circle cx="86" cy="109" r="4.5" fill="#252530"/>
  <circle cx="114" cy="109" r="7" fill="none" stroke="#00E5C0" stroke-width="1.8"/>
  <circle cx="144" cy="109" r="4.5" fill="#252530"/>

  <!-- Row 3 -->
  <circle cx="56" cy="127" r="4.5" fill="#252530"/>
  <circle cx="86" cy="127" r="7" fill="none" stroke="#00E5C0" stroke-width="1.5" opacity="0.6"/>
  <circle cx="114" cy="127" r="4.5" fill="#252530"/>
  <circle cx="144" cy="127" r="4.5" fill="#252530"/>

  <!-- "evnto" wordmark below -->
  <text x="100" y="168" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#00E5C0" text-anchor="middle" letter-spacing="5">evnto</text>
</svg>
