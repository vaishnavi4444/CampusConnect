<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D0F"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5C0"/>
      <stop offset="100%" style="stop-color:#00B49A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Calendar body -->
  <rect x="5" y="9" width="22" height="18" rx="3" fill="#18181C"/>

  <!-- Top bar -->
  <rect x="5" y="9" width="22" height="7" rx="3" fill="url(#acc)"/>
  <rect x="5" y="14" width="22" height="2" fill="url(#acc)"/>

  <!-- Rings -->
  <rect x="10" y="6" width="3" height="6" rx="1.5" fill="url(#acc)"/>
  <rect x="19" y="6" width="3" height="6" rx="1.5" fill="url(#acc)"/>

  <!-- 3 dots -->
  <circle cx="10" cy="22" r="2" fill="url(#acc)"/>
  <polyline points="8.7,22 9.8,23.3 12,20.8" fill="none" stroke="#0D0D0F" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="16" cy="22" r="1.5" fill="#2A2A35"/>
  <circle cx="22" cy="22" r="1.5" fill="#2A2A35"/>
</svg>
